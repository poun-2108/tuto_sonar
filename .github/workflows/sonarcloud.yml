name: SonarCloud

on:
  push:
    branches:
      - main

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compiler le projet
        run: |
          mkdir -p bin
          javac -d bin src/SonarHorrorAuth.java

      - name: Analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=METS_ICI_TON_PROJECT_KEY
            -Dsonar.organization=METS_ICI_TON_ORGANIZATION_KEY
            -Dsonar.sources=src
